<!DOCTYPE html>
<html>
<head>
    <title>Issuetracker Settings</title>
    <meta charset="utf-8">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/vendor/line-awesome/css/line-awesome.min.css">
</head>
<body class="bg-[#11122a] text-[#e8e8f0]">
    <aside class="fixed left-0 top-0 h-screen w-[220px] border-r border-[#242549] bg-[#1a1b39] px-3 py-4 flex flex-col">
        <div class="flex items-center gap-2 mb-5">
            <img src="./assets/img/bitninja.svg" alt="Issuetracker logo" class="w-[34px] h-[34px]">
            <div class="font-bold text-sm leading-tight tracking-wide">ISSUE<br>TRACKER</div>
        </div>
        <nav class="flex flex-col gap-1.5">
            <button class="w-full rounded-[10px] px-3 py-2.5 text-left text-sm text-gray-200 bg-[#2a2c56] inline-flex items-center gap-2"><i class="las la-cog text-base"></i><span>Settings</span></button>
        </nav>
        <div class="mt-auto pt-3">
            <a href="management.html" class="block w-full rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-center text-sm font-semibold text-white hover:bg-[#34376a]">
                <span class="inline-flex items-center justify-center gap-2"><i class="las la-arrow-left text-base"></i><span>Back to Management</span></span>
            </a>
        </div>
    </aside>

    <main class="ml-[220px] min-h-screen p-6">
        <div class="mb-4">
            <div class="text-xs font-semibold text-[#8f93d8]">Settings</div>
        </div>

        <section class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4 mb-4">
            <h2 class="text-sm text-gray-300 mb-3">Your Details</h2>
            <input type="text" id="bn-it-username" placeholder="Username"
                class="w-full rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
        </section>

        <section class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4 mb-4">
            <h2 class="text-sm text-gray-300 mb-3">API Keys / URLs</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="bn-it-url" placeholder="IssueTracker API URL"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
                <input type="text" id="bn-ui-url" placeholder="Management UI URL (optional)"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
                <input type="text" id="bn-it-api" placeholder="IssueTracker API Key"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7] md:col-span-2">
                <input type="text" id="intercomAPI" placeholder="Intercom API Key"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
                <input type="text" id="jiraAPI" placeholder="JIRA API Key"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
                <input type="text" id="zendeskAPI" placeholder="Zendesk API Key"
                    class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7] md:col-span-2">
            </div>
            <div class="mt-4">
                <button id="saveButton" class="rounded-lg border border-[#4292f2] bg-[#2f7bdb] px-4 py-2 text-sm font-semibold text-white hover:bg-[#2a6fc6] inline-flex items-center gap-2"><i class="las la-save text-base"></i><span>Update Settings</span></button>
            </div>
        </section>

        <section id="debug-info" class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4 text-xs text-gray-400">
            Debug Info:
        </section>
    </main>

    <script src="options.js"></script>
</body>
</html>
