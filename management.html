<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Issuetracker</title>
  <link href="css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/vendor/line-awesome/css/line-awesome.min.css">
</head>
<body class="bg-[#11122a] text-[#e8e8f0]">
  <aside class="fixed left-0 top-0 h-screen w-[220px] border-r border-[#242549] bg-[#1a1b39] px-3 py-4 flex flex-col">
      <div class="flex items-center gap-2 mb-5">
        <img src="./assets/img/bitninja.svg" alt="Issuetracker logo" class="w-[34px] h-[34px]">
        <div class="font-bold text-sm leading-tight tracking-wide">ISSUE<br>TRACKER</div>
      </div>
      <nav class="flex flex-col gap-1.5">
        <button id="menu-new" class="nav-btn w-full rounded-[10px] px-3 py-2.5 text-left text-sm text-gray-200 hover:bg-[#2a2c56] inline-flex items-center gap-2"><i class="las la-plus-circle text-base"></i><span>New Issue</span></button>
        <button id="menu-issues" class="nav-btn w-full rounded-[10px] px-3 py-2.5 text-left text-sm text-white bg-[#c23843] inline-flex items-center gap-2"><i class="las la-list text-base"></i><span>All Issues</span></button>
        <button id="menu-ongoing" class="nav-btn w-full rounded-[10px] px-3 py-2.5 text-left text-sm text-gray-200 hover:bg-[#2a2c56] inline-flex items-center gap-2"><i class="las la-exclamation-circle text-base"></i><span>Ongoing Issues</span></button>
        <button id="menu-top-users" class="nav-btn w-full rounded-[10px] px-3 py-2.5 text-left text-sm text-gray-200 hover:bg-[#2a2c56] inline-flex items-center gap-2"><i class="las la-fire-alt text-base"></i><span>Risk Center</span></button>
      </nav>
      <div class="mt-auto pt-3">
        <button id="open-options" class="w-full rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a] inline-flex items-center justify-center gap-2"><i class="las la-cog text-base"></i><span>Settings</span></button>
      </div>
  </aside>

    <main class="ml-[220px] min-h-screen p-6">
      <div class="mb-4 flex items-center justify-between">
        <div class="text-xs font-semibold text-[#8f93d8]">v3.0.0</div>
      </div>

      <section id="filters-section" class="mb-4 rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4">
        <div class="text-xs text-gray-400 mb-2" id="view-label">View: Issues</div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
          <select id="search-field" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
            <option value="issue-id">Issue ID</option>
            <option value="uid">UID</option>
            <option value="platform">Platform</option>
            <option value="issue-type">Issue Type</option>
            <option value="note">Note</option>
            <option value="unsolved">Not Solved</option>
          </select>
          <input id="search-uuid" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7] md:col-span-2" placeholder="Search value">
          <div class="flex gap-2">
            <button id="search-btn" class="flex-1 rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a] inline-flex items-center justify-center gap-2"><i class="las la-search text-base"></i><span>Search</span></button>
            <button id="refresh-btn" class="flex-1 rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a] inline-flex items-center justify-center gap-2"><i class="las la-sync-alt text-base"></i><span>Refresh</span></button>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4" id="summary-cards">
        <div class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4">
          <div id="sum-1-label" class="text-xs text-gray-400">TOTAL</div>
          <div id="sum-1-value" class="text-2xl font-bold">0</div>
        </div>
        <div class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4">
          <div id="sum-2-label" class="text-xs text-gray-400">SOLVED</div>
          <div id="sum-2-value" class="text-2xl font-bold text-emerald-400">0</div>
        </div>
        <div class="rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4">
          <div id="sum-3-label" class="text-xs text-gray-400">ONGOING</div>
          <div id="sum-3-value" class="text-2xl font-bold text-rose-400">0</div>
        </div>
      </section>

      <div class="mt-4" id="issues-section">
        <div id="issues-body" class="space-y-3"></div>
      </div>

      <div class="mt-4 hidden rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4" id="new-issue-section">
        <form id="new-issue-form" class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <input id="new-uid" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" placeholder="User ID" required>
          <select id="new-module" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" required>
            <option value="" disabled selected>Issue Type / Module</option>
            <option value="Other">Other</option><option value="License">License</option><option value="Billing-Payment">Billing/Payment</option>
            <option value="Install Help">Install Help</option><option value="General Question">General Question</option><option value="Config Help">Config Help</option>
            <option value="IP Filter">IP Filter</option><option value="WAF">WAF</option><option value="WAFPro">WAFPro</option>
            <option value="FilePatcher">FilePatcher</option><option value="SslTerminating">SslTerminating</option><option value="ConfigParser">ConfigParser</option>
            <option value="Port Honeypot">PortHoneypot</option><option value="Anti Flood">Anti Flood</option><option value="DoS Detection">DoS Detection</option>
            <option value="Malware Detection">Malware Detection</option><option value="SandBox Scanner">Sandbox Scanner</option><option value="Sense Log">Sense Log</option>
            <option value="Defense Robot">Defense Robot</option><option value="Proxy Filter">Proxy Filter</option><option value="SiteProtection">SiteProtection</option>
            <option value="SpamDetection">SpamDetection</option><option value="Reseller">Reseller</option><option value="Process Analysis">Process Analysis</option>
            <option value="Windows-IPFilter">Windows - IP Filter</option><option value="Windows-Other">Windows - Other</option>
          </select>
          <div class="flex items-center gap-2">
            <select id="new-platform" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7] flex-1" required>
              <option value="" disabled selected>Platform</option>
              <option value="Zendesk">Zendesk</option><option value="Jira">Jira</option><option value="Intercom">Intercom</option><option value="Slack">Slack</option>
            </select>
            <span id="new-platform-preview" class="inline-flex items-center gap-1 text-xs text-gray-300"></span>
          </div>
          <input id="new-ticketid" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" placeholder="Ticket ID">
          <input id="new-platformlink" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" placeholder="Platform link source" value="jiraLink">
          <select id="new-qori" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]"><option value="issue">Issue</option><option value="question">Question</option></select>
          <label class="text-xs text-gray-300 flex items-center gap-2"><input id="new-escalated" type="checkbox"> Escalated</label>
          <label class="text-xs text-gray-300 flex items-center gap-2"><input id="new-intrial" type="checkbox"> Trial User</label>
          <textarea id="new-note" rows="3" class="rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7] md:col-span-2" placeholder="Note"></textarea>
          <div class="md:col-span-2"><button type="submit" class="rounded-lg border border-[#4292f2] bg-[#2f7bdb] px-4 py-2 text-sm font-semibold text-white hover:bg-[#2a6fc6]">Track Issue</button></div>
        </form>
      </div>

      <div id="issues-pagination" class="mt-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2 text-sm">
          <label for="page-size">Rows:</label>
          <select id="page-size" class="rounded border border-[#262a56] bg-[#171836] px-2 py-1 text-[#dcdff7]"><option value="10">10</option><option value="20" selected>20</option><option value="50">50</option></select>
        </div>
        <div class="flex items-center gap-2">
          <button id="page-prev" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Prev</button>
          <span id="page-info" class="text-sm text-gray-300">Page 1 / 1</span>
          <button id="page-next" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Next</button>
        </div>
      </div>

      <div class="mt-4 hidden" id="top-users-section">
        <div class="mb-3 flex items-center justify-between">
          <div class="text-xl font-semibold text-[#e8e9f7]">Risk Center</div>
          <button id="sync-top-risk" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-xs font-semibold text-white hover:bg-[#34376a] inline-flex items-center gap-2"><i class="las la-sync text-base"></i><span>Sync Top 30 to Top Risk</span></button>
        </div>
        <div id="risk-center-summary" class="hidden grid grid-cols-1 gap-0 rounded-xl border border-[#2f73c9] bg-[#1a1c3a] mb-3 overflow-hidden">
          <div class="px-4 py-3">
            <div class="text-xs text-[#8b8fb6]">MRR DANGER</div>
            <div id="risk-mrr-total" class="text-2xl font-bold text-white">$0</div>
          </div>
        </div>
        <div class="mb-3 flex items-center gap-2">
          <button id="risk-filter-all" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-1.5 text-xs font-semibold text-white">All</button>
          <button id="risk-filter-none" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-transparent px-3 py-1.5 text-xs font-semibold text-[#aeb3de]">No Risk</button>
          <button id="risk-filter-low" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-transparent px-3 py-1.5 text-xs font-semibold text-[#aeb3de]">Low Risk</button>
          <button id="risk-filter-medium" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-transparent px-3 py-1.5 text-xs font-semibold text-[#aeb3de]">Medium Risk</button>
          <button id="risk-filter-high" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-transparent px-3 py-1.5 text-xs font-semibold text-[#aeb3de]">High Risk</button>
          <button id="risk-filter-very-high" class="risk-filter-btn rounded-lg border border-[#3a3f71] bg-transparent px-3 py-1.5 text-xs font-semibold text-[#aeb3de]">Very High Risk</button>
        </div>
        <div class="space-y-2" id="top-users-body">
        </div>
        <div id="top-users-pagination" class="mt-3 hidden flex items-center justify-end gap-2">
          <button id="top-page-prev" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Prev</button>
          <span id="top-page-info" class="text-sm text-gray-300">Page 1 / 1</span>
          <button id="top-page-next" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Next</button>
        </div>
      </div>

      <div id="status" class="text-sm text-gray-300 mt-3"></div>
      <div id="error" class="text-sm text-red-400 mt-1 hidden"></div>
    </main>

  <div class="hidden fixed inset-0 z-50 bg-[rgba(7,9,22,0.75)] items-center justify-center p-4" id="manage-section">
    <div class="w-full max-w-3xl rounded-xl border border-[#262a56] bg-[#1a1c3a] p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm text-gray-300" id="manage-title">Manage Issue</div>
        <button id="manage-close" class="rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Close</button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <label class="text-xs text-gray-300">Issue ID
          <input id="manage-uuid" class="mt-1 w-full rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" disabled>
        </label>
        <label class="text-xs text-gray-300">User
          <input id="manage-user" class="mt-1 w-full rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]" disabled>
        </label>
        <label class="text-xs text-gray-300">Ongoing Risk
          <select id="manage-ongoing-risk" class="mt-1 w-full rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <label class="text-xs text-gray-300">Ongoing Action
          <button id="manage-toggle-ongoing" type="button" class="mt-1 w-full rounded-lg border border-[#3a3f71] bg-[#2b2d57] px-3 py-2 text-sm font-semibold text-white hover:bg-[#34376a]">Move To Ongoing</button>
        </label>
        <label class="text-xs text-gray-300 md:col-span-2">Note
          <textarea id="manage-note" rows="4" class="mt-1 w-full rounded-lg border border-[#262a56] bg-[#171836] px-3 py-2 text-[#dcdff7]"></textarea>
        </label>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <button id="manage-save-note" class="rounded-lg bg-amber-700 px-3 py-2 text-sm font-semibold text-white hover:bg-amber-600">Save Note</button>
        <button id="manage-solve-dev" class="rounded-lg bg-emerald-700 px-3 py-2 text-sm font-semibold text-white hover:bg-emerald-600">Solve Dev</button>
        <button id="manage-solve-supp" class="rounded-lg bg-cyan-700 px-3 py-2 text-sm font-semibold text-white hover:bg-cyan-600">Solve Supp</button>
        <button id="manage-delete" class="rounded-lg bg-rose-700 px-3 py-2 text-sm font-semibold text-white hover:bg-rose-600">Delete</button>
      </div>
    </div>
  </div>

  <script src="management.js"></script>
</body>
</html>
